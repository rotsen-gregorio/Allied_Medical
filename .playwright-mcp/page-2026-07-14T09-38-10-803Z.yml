  - generic [ref=f121e17]:
    - generic [ref=f121e18]: About AMHS
    - heading "Healthcare Education Excellence" [level=1] [ref=f121e19]
    - paragraph [ref=f121e20]: Since our founding, Allied Medical & Health Services has been committed to preparing students with the skills and knowledge needed for success in healthcare careers.
  - generic [ref=f121e21]:
    - heading "Our Mission" [level=2] [ref=f121e22]
    - paragraph [ref=f121e23]: The mission of AMHS is to create nursing and allied health educational training programs that prepare students to develop the quality of skills and knowledge they need for patient care in hospitals, long-term care facilities, and healthcare agencies.
    - paragraph [ref=f121e24]: We are dedicated to fostering opportunities for learning, self-discipline, professionalism, and the ability to meet employer expectations in today's competitive job market. Our courses are designed to equip graduates with the confidence and tools necessary to excel in the medical field.
    - generic [ref=f121e25]:
      - generic [ref=f121e26]:
        - heading "Student-Centered Learning" [level=3] [ref=f121e27]
        - paragraph [ref=f121e28]: We foster a supportive environment that emphasizes proper attitudes, professional development, and practical skills needed for success.
      - generic [ref=f121e29]:
        - heading "Quality Education" [level=3] [ref=f121e30]
        - paragraph [ref=f121e31]: With fast-paced technological development and state-of-the-art training methods, we ensure our graduates are industry-ready.
      - generic [ref=f121e32]:
        - heading "Community Focus" [level=3] [ref=f121e33]
        - paragraph [ref=f121e34]: We recognize the healthcare needs of our growing population and uphold the highest standards of academic training and professional ethics.
  - generic [ref=f121e35]:
    - heading "Our Philosophy" [level=2] [ref=f121e36]
    - paragraph [ref=f121e37]: AMHS believes in providing allied health education that meets the evolving needs of our growing, longevity-oriented population. We recognize the importance of accountability in healthcare and uphold strong value systems centered on respect for human rights and dignity.
    - paragraph [ref=f121e38]: With respect for human rights and faith in the highest standards of academic training, combined with technological advancement and modern educational methods, we equip our graduates with the knowledge and confidence to compete successfully in the dynamic medical field.
  - generic [ref=f121e39]:
    - heading "Accreditation & Compliance" [level=2] [ref=f121e40]
    - generic [ref=f121e41]:
      - heading "BPPE Approval" [level=3] [ref=f121e42]
      - paragraph [ref=f121e43]:
        - text: AMHS School is a private institution approved to operate by the
        - strong [ref=f121e44]: Bureau for Private Post-Secondary Education (BPPE)
        - text: ", which is part of the California Department of Consumer Affairs."
      - paragraph [ref=f121e45]: Our approval means we are compliant with the minimum standards contained in the California Private Postsecondary Education Act of 2009 (as amended) and Division 7.5 of Title 5 of the California Code of Regulations.
      - paragraph [ref=f121e46]:
        - strong [ref=f121e47]: "BPPE Contact Information:"
