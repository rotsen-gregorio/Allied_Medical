        - generic [ref=f31e2570]:
          - generic [ref=f31e2571]: FAQ
          - generic [ref=f31e2575]:
            - heading "Frequently Asked Questions" [level=2] [ref=f31e2577]
            - generic [ref=f31e2580]:
              - generic [ref=f31e2581]:
                - heading "How does billing work?" [level=3] [ref=f31e2582]
                - paragraph [ref=f31e2584]:
                  - text: "Render charges for three things: your workspace plan (flat subscription), metered features like bandwidth (usage-based), and"
                  - link "compute" [ref=f31e2585] [cursor=pointer]:
                    - /url: https://render.com/pricing#compute
                  - text: for your applications (usage-based).
              - generic [ref=f31e2586]:
                - heading "How am I billed for compute?" [level=3] [ref=f31e2587]
                - paragraph [ref=f31e2589]:
                  - link "Compute plans" [ref=f31e2590] [cursor=pointer]:
                    - /url: https://render.com/pricing#compute
                  - text: are set at a per-service basis, and billing is prorated to the second. If you create a web service on a paid compute plan and turn it off 24 hours later, you are only billed for 24 hours of compute. This also applies to service types that spin up and shut down automatically, like Cron Jobs and Workflows. You are only billed for compute when these services are actively running your workload.
              - generic [ref=f31e2591]:
                - heading "My Pro or Scale workspace did not have any activity or services this month. Will I still be charged for the workspace subscription?" [level=3] [ref=f31e2592]
                - paragraph [ref=f31e2594]: If a workspace has no services (live or suspended) and no activity during a month, the workspace subscription fee for that month will be waived.
              - generic [ref=f31e2595]:
                - heading "I run a large agency with developers on multiple teams. What does this mean for us?" [level=3] [ref=f31e2596]
                - paragraph [ref=f31e2598]:
                  - text: Scale and Enterprise plans let you create multiple workspaces within the same organization to better manage multiple teams. Our team is happy to help you determine the best way to organize your teams on Render.
                  - link "Contact us" [ref=f31e2599] [cursor=pointer]:
                    - /url: https://render.com/contact
                  - text: here.
              - generic [ref=f31e2600]:
                - heading "What are build pipeline minutes, and how can I track my usage?" [level=3] [ref=f31e2601]
                - generic [ref=f31e2602]:
                  - paragraph [ref=f31e2603]:
                    - text: Your workspace's builds and other pre-deploy tasks use Render compute resources.
                    - link "Pipeline minutes" [ref=f31e2604] [cursor=pointer]:
                      - /url: https://docs.render.com/build-pipeline#pipeline-minutes
                    - text: track the duration of these tasks. You can view your pipeline usage from your dashboard's Billing page.
                  - paragraph [ref=f31e2605]:
                    - text: With a Professional plan or higher, you can enable the
                    - link "Performance pipeline" [ref=f31e2606] [cursor=pointer]:
                      - /url: https://docs.render.com/build-pipeline#pipeline-tiers
                    - text: to run builds on larger compute instances, with an additional corresponding charge for pipeline minutes.
              - generic [ref=f31e2607]:
                - heading "How do free compute plans work?" [level=3] [ref=f31e2608]
                - paragraph [ref=f31e2610]:
                  - text: With Render’s
                  - link "Free compute plans" [ref=f31e2611] [cursor=pointer]:
                    - /url: https://render.com/docs/free
                  - text: ", you can spin up"
                  - link "web services" [ref=f31e2612] [cursor=pointer]:
                    - /url: https://docs.render.com/free#free-web-services
                  - text: ","
                  - link "Render Key Value instances" [ref=f31e2613] [cursor=pointer]:
                    - /url: https://docs.render.com/free#free-key-value
                  - text: ", and"
                  - link "Render Postgres databases" [ref=f31e2614] [cursor=pointer]:
                    - /url: https://render.com/docs/free#free-postgres
                  - text: at no charge. Free compute plans types have usage limits and are designed to help you to explore new tech, build personal projects, and preview Render's developer experience.
              - generic [ref=f31e2615]:
                - heading "Which payment methods do you accept?" [level=3] [ref=f31e2616]
                - paragraph [ref=f31e2618]:
                  - text: We accept all major credit and debit cards. Your payment info is stored and processed securely by
                  - link "Stripe" [ref=f31e2619] [cursor=pointer]:
                    - /url: https://stripe.com/
                  - text: and never touches our servers.
              - generic [ref=f31e2620]:
                - heading "Why was I charged $1 after adding a credit card?" [level=3] [ref=f31e2621]
                - paragraph [ref=f31e2623]: A $1 USD transaction is performed as a credit security check to ensure your card details are correct and authorized. The charge is refunded after the transaction completes.
              - generic [ref=f31e2624]:
                - heading "I have an infrequently asked question." [level=3] [ref=f31e2625]
                - paragraph [ref=f31e2627]:
                  - text: Great! We're always around to help. You can email us any time at
                  - link "support@render.com" [ref=f31e2628] [cursor=pointer]:
                    - /url: mailto:support@render.com
                  - text: ", or talk to us in our"
                  - link "user community" [ref=f31e2629] [cursor=pointer]:
                    - /url: https://community.render.com/
                  - text: .
