  - generic [ref=f83e17]:
    - generic [ref=f83e18]: Vocational Nursing Program
    - heading "Launch Your Nursing Career" [level=1] [ref=f83e19]
    - paragraph [ref=f83e20]: Comprehensive practical training for nursing fundamentals, clinical skills, and patient support. Complete 1,564 hours of intensive theory and clinical training to become a Licensed Vocational Nurse.
    - link "Call to Enroll" [ref=f83e22] [cursor=pointer]:
      - /url: tel:8186377871
  - generic [ref=f83e23]:
    - heading "Course Objective" [level=2] [ref=f83e24]
    - paragraph [ref=f83e25]: The Vocational Nursing course is designed to teach students extensive and in-depth knowledge and skills necessary to perform various duties including medication administration, treatments, and other procedures as nurses caring for patients in long-term facilities or acute care hospitals.
    - paragraph [ref=f83e26]: Upon completion of 1,564 hours of theory and clinical training, students will be evaluated by the school on their competency to be eligible for graduation and to qualify for the licensing examination.
    - paragraph [ref=f83e27]: Licensure is awarded by the State through the Bureau of Vocational Nursing and Psychiatric Technician (BVNPT) after passing the Competency Examination (NCLEX).
  - generic [ref=f83e28]:
    - heading "Program Overview" [level=2] [ref=f83e29]
    - paragraph [ref=f83e30]: Vocational Nursing is divided into theory class (604 hours of lecture) and clinical/skills laboratory training (960 hours of practical experience), totaling 1,564 hours for a year and a half.
    - heading "Theory Class Subjects" [level=3] [ref=f83e31]
    - list [ref=f83e32]:
      - listitem [ref=f83e33]: Nutrition
      - listitem [ref=f83e34]: Psychology
      - listitem [ref=f83e35]: Growth & Development
      - listitem [ref=f83e36]: Fundamentals of Nursing
      - listitem [ref=f83e37]: Nursing Process
      - listitem [ref=f83e38]: Communication
      - listitem [ref=f83e39]: Patient Education
      - listitem [ref=f83e40]: Medical Surgical Nursing
      - listitem [ref=f83e41]: Communicable Disease & Gerontological Nursing
      - listitem [ref=f83e42]: Rehabilitative Nursing
      - listitem [ref=f83e43]: Maternity Nursing
      - listitem [ref=f83e44]: Pediatric Nursing
      - listitem [ref=f83e45]: Home Health Nursing
      - listitem [ref=f83e46]: Leadership & Supervision
