  - generic [ref=f83e79]:
    - heading "Admission Requirements" [level=2] [ref=f83e80]
    - paragraph [ref=f83e81]: "Completion of the following are required before starting the program:"
    - list [ref=f83e82]:
      - listitem [ref=f83e83]: Passing the entrance examination for Writing, Reading and Numerical Skills (fee applies)
      - listitem [ref=f83e84]: 17 years or older
      - listitem [ref=f83e85]: US High School Diploma/GED Certification/Equivalent (evaluation needed for foreign transcripts)
      - listitem [ref=f83e86]: Copies of Driver's License & Social Security Card
      - listitem [ref=f83e87]: Two (2) 1x1 photographs
      - listitem [ref=f83e88]: Nursing Assistant Certificate/License
      - listitem [ref=f83e89]:
        - strong [ref=f83e90]: Anatomy & Physiology
      - listitem [ref=f83e91]:
        - strong [ref=f83e92]: Pharmacology
      - listitem [ref=f83e93]: CPR "C" Card
      - listitem [ref=f83e94]: First Aid & Fire Safety Card
      - listitem [ref=f83e95]: Medical Clearance (Physical Exam, Hepatitis titre A & B, Varicella, Rubeola, Rubella, Drug Test, TB)
      - listitem [ref=f83e96]: Letter(s) of recommendation (minimum of 2) from identifiable and respectable US citizen for at least 1 year, or California resident for at least 2 years
  - generic [ref=f83e97]:
    - heading "Job Opportunities" [level=2] [ref=f83e98]
    - paragraph [ref=f83e99]: "As a Licensed Vocational Nurse (LVN), you will be eligible to work in the following areas:"
    - list [ref=f83e100]:
      - listitem [ref=f83e101]: Acute Care Hospitals
      - listitem [ref=f83e102]: Transitional Unit Facilities
      - listitem [ref=f83e103]: Skilled Nursing Homes
      - listitem [ref=f83e104]: Nursing Registries
      - listitem [ref=f83e105]: In-Home Care Services
      - listitem [ref=f83e106]: All other Allied Health Institutions
    - paragraph [ref=f83e107]:
      - strong [ref=f83e108]: "Note:"
      - text: AMHS currently does not have job placement services, but our graduates are highly sought after in the healthcare industry.
  - generic [ref=f83e109]:
    - heading "State Licensing Requirements" [level=2] [ref=f83e110]
    - paragraph [ref=f83e111]: A license is required for Vocational Nurse practice in the State of California. Upon program completion, graduates may apply for the licensing examination given by the Board of Vocational Nursing and Psychiatric Technicians.
