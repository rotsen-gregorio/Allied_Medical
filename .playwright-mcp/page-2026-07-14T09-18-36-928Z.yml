  - generic [ref=f93e17]:
    - generic [ref=f93e18]: Phlebotomy Technician I Program
    - heading "Master Venous Blood Collection" [level=1] [ref=f93e19]
    - paragraph [ref=f93e20]: Learn safe and effective methods of venous blood collection. Complete 98 hours of comprehensive training to become certified in phlebotomy.
    - link "Call to Enroll" [ref=f93e22] [cursor=pointer]:
      - /url: tel:8186377871
  - generic [ref=f93e23]:
    - heading "Course Objective" [level=2] [ref=f93e24]
    - paragraph [ref=f93e25]: This course was developed for the non-licensed professional who wishes to learn safe and effective methods of venous blood collection. The course covers a comprehensive review of basic anatomy and physiology, laboratory terminology, legal complications, safety factors, potential complications and preventive measures.
    - paragraph [ref=f93e26]: Students will master the psychological and physical preparation of subjects, choice of venipuncture sites, types of devices used, types of collection tubes, order of draw, and the appropriate technique of performing a venipuncture. You'll also learn universal precautions and the appropriate handling and care of collected specimens.
  - generic [ref=f93e27]:
    - heading "Program Overview" [level=2] [ref=f93e28]
    - paragraph [ref=f93e29]: The Phlebotomy Technician I program consists of 98 total hours—divided into didactic (lecture) and practical (clinical) training. Students must complete 25 skin punctures and 50 successful venipunctures to qualify for certification and to take the state board examination.
    - paragraph [ref=f93e30]: "The program is divided into two components: Basic Phlebotomy and Advanced Phlebotomy."
