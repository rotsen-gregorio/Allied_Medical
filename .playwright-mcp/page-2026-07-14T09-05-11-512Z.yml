  - generic [ref=f72e17]:
    - generic [ref=f72e18]: Vocational Nursing Program
    - heading "Launch Your Nursing Career" [level=1] [ref=f72e19]
    - paragraph [ref=f72e20]: Comprehensive practical training for nursing fundamentals, clinical skills, and patient support. Start your journey to becoming a Licensed Vocational Nurse (LVN) today.
    - link "Call to Enroll" [ref=f72e22] [cursor=pointer]:
      - /url: tel:8186377871
  - generic [ref=f72e23]:
    - heading "Program Overview" [level=2] [ref=f72e24]
    - paragraph [ref=f72e25]: Our Vocational Nursing program is designed to prepare students for a rewarding career in healthcare. Through hands-on training and classroom instruction, you'll develop the practical skills needed to provide quality patient care in hospitals, clinics, and long-term care facilities.
    - paragraph [ref=f72e26]: This program is BPPE Approved and meets all California licensing requirements for Vocational Nurses.
  - generic [ref=f72e27]:
    - heading "What You'll Learn" [level=2] [ref=f72e28]
    - generic [ref=f72e29]:
      - generic [ref=f72e30]:
        - heading "Nursing Fundamentals" [level=3] [ref=f72e31]
        - paragraph [ref=f72e32]: Master core nursing principles, patient assessment, and basic medical procedures essential to patient care.
      - generic [ref=f72e33]:
        - heading "Clinical Skills" [level=3] [ref=f72e34]
        - paragraph [ref=f72e35]: Gain hands-on experience with vital signs monitoring, medication administration, and patient hygiene protocols.
      - generic [ref=f72e36]:
        - heading "Patient Support" [level=3] [ref=f72e37]
        - paragraph [ref=f72e38]: Develop compassionate communication skills and learn to support patients emotionally throughout their healthcare journey.
      - generic [ref=f72e39]:
        - heading "Licensed Preparation" [level=3] [ref=f72e40]
        - paragraph [ref=f72e41]: Complete preparation for the Licensed Vocational Nurse (LVN) examination with exam-focused coursework.
      - generic [ref=f72e42]:
        - heading "Healthcare Standards" [level=3] [ref=f72e43]
        - paragraph [ref=f72e44]: Learn current healthcare standards, infection control, and patient safety protocols.
      - generic [ref=f72e45]:
        - heading "Professional Development" [level=3] [ref=f72e46]
        - paragraph [ref=f72e47]: Build professional judgment, ethical decision-making, and team collaboration skills.
