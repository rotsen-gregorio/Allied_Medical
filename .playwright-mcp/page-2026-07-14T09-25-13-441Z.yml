  - generic [ref=f98e17]:
    - generic [ref=f98e18]: Nursing Assistant Program
    - heading "Start Your Healthcare Career" [level=1] [ref=f98e19]
    - paragraph [ref=f98e20]: Learn essential bedside care and patient support skills. Complete 152 hours of comprehensive training to become a certified Nursing Assistant.
    - link "Call to Enroll" [ref=f98e22] [cursor=pointer]:
      - /url: tel:8186377871
  - generic [ref=f98e23]:
    - heading "Course Objective" [level=2] [ref=f98e24]
    - paragraph [ref=f98e25]: This course was designed to teach students the basic knowledge and skills necessary to perform various duties assisting staff nurses in the care of patients in long-term facilities or acute care hospitals.
    - paragraph [ref=f98e26]: Successful completion of the Nursing Assistant course may be the initial step leading to a "ladder type" Nursing career program towards LVN or RN, and may also prepare students for other related Allied Health Technological courses such as Laboratory, Radiology, Physiotherapy, Dietary, or Social Work.
  - generic [ref=f98e27]:
    - heading "Program Overview" [level=2] [ref=f98e28]
    - paragraph [ref=f98e29]: Upon completion of 152 hours of theory and clinical training, students will be evaluated by the school on their competency to be eligible for graduation and to qualify for the licensing examination.
    - paragraph [ref=f98e30]: Licensure is awarded by the State after passing the Competency Examination, which consists of skill and theoretical (written) proficiency evaluation by Department of Health Services licensing agencies (American Red Cross or NATAP).
  - generic [ref=f98e31]:
    - heading "Training Schedule" [level=2] [ref=f98e32]
    - generic [ref=f98e33]:
      - generic [ref=f98e34]:
        - heading "Program Duration" [level=4] [ref=f98e35]
        - paragraph [ref=f98e36]: 3 Months (19 days)152 Total Hours
      - generic [ref=f98e37]:
        - heading "Saturday" [level=4] [ref=f98e38]
        - paragraph [ref=f98e39]: 7:00am - 3:00pm
      - generic [ref=f98e40]:
        - heading "Sunday" [level=4] [ref=f98e41]
        - paragraph [ref=f98e42]: 9:00am - 4:00pm
    - paragraph [ref=f98e43]:
      - emphasis [ref=f98e44]: Weekend classes provide flexible training for students balancing work and education.
  - generic [ref=f98e45]:
    - heading "Admission Requirements" [level=2] [ref=f98e46]
    - list [ref=f98e47]:
      - listitem [ref=f98e48]: 16 years or older
      - listitem [ref=f98e49]: High School Grade Level or GED
      - listitem [ref=f98e50]: Livescan clearance application
      - listitem [ref=f98e51]: CPR "A" card or higher
      - listitem [ref=f98e52]: Medical Clearance (Physical Exam & TB Test)
  - generic [ref=f98e53]:
    - heading "What You'll Learn" [level=2] [ref=f98e54]
    - generic [ref=f98e55]:
      - generic [ref=f98e56]:
        - heading "Bedside Care" [level=3] [ref=f98e57]
        - paragraph [ref=f98e58]: Master essential patient care skills including hygiene, comfort measures, and daily living assistance for hospitalized and long-term care patients.
      - generic [ref=f98e59]:
        - heading "Patient Support" [level=3] [ref=f98e60]
        - paragraph [ref=f98e61]: Develop compassionate communication skills and learn to provide emotional and physical support to patients during their healthcare journey.
      - generic [ref=f98e62]:
        - heading "Medical Procedures" [level=3] [ref=f98e63]
        - paragraph [ref=f98e64]: Learn basic medical procedures, vital signs monitoring, and proper documentation of patient care activities.
      - generic [ref=f98e65]:
        - heading "Safety & Infection Control" [level=3] [ref=f98e66]
        - paragraph [ref=f98e67]: Understand healthcare safety protocols, infection prevention measures, and proper equipment handling techniques.
      - generic [ref=f98e68]:
        - heading "Team Collaboration" [level=3] [ref=f98e69]
        - paragraph [ref=f98e70]: Learn to work effectively with nurses, physicians, and other healthcare professionals in various care settings.
      - generic [ref=f98e71]:
        - heading "Professional Standards" [level=3] [ref=f98e72]
        - paragraph [ref=f98e73]: Develop professional judgment, ethical decision-making, and adherence to healthcare standards and regulations.
  - generic [ref=f98e74]:
    - heading "Job Opportunities" [level=2] [ref=f98e75]
    - paragraph [ref=f98e76]: "As a certified Nursing Assistant, you will be eligible to work in the following healthcare settings:"
    - list [ref=f98e77]:
      - listitem [ref=f98e78]: Acute Care Hospitals
      - listitem [ref=f98e79]: Transitional Unit Facilities
      - listitem [ref=f98e80]: Skilled Nursing Homes
      - listitem [ref=f98e81]: Nursing Registries
      - listitem [ref=f98e82]: In-Home Care Services
  - generic [ref=f98e83]:
    - heading "Career Advancement" [level=2] [ref=f98e84]
    - paragraph [ref=f98e85]: "The Nursing Assistant certification is an excellent foundation for further healthcare education. Many students use this program as a stepping stone to pursue advanced certifications and degree programs, including:"
    - list [ref=f98e86]:
      - listitem [ref=f98e87]: Licensed Vocational Nurse (LVN) Programs
