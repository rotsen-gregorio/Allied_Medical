<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | AMHS Inc</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #0f172a;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(15,23,42,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .logo-box {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,0.14);
      overflow: hidden;
      display: grid;
      place-items: center;
      background: #fff;
      box-shadow: 0 4px 12px rgba(15,23,42,0.08);
      flex-shrink: 0;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    .logo-name { font-size: 1rem; font-weight: 700; color: #0f172a; line-height: 1.2; }
    .logo-sub { font-weight: 400; font-size: 0.8rem; color: #475569; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.4rem; }
    .subtitle { color: #475569; font-size: 0.9rem; margin-bottom: 1.75rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 0.35rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid rgba(15,23,42,0.15);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #0f172a;
      background: #f8fafc;
      margin-bottom: 1.25rem;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #0f62fe;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #0f62fe;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #0050e6; }
    button:disabled { opacity: 0.65; cursor: default; }
    .error-msg {
      margin-top: 1rem;
      padding: 0.7rem 0.9rem;
      background: #fde8e8;
      color: #9b1c1c;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
      border: 1px solid #f5c0c0;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #475569;
      text-decoration: none;
    }
    .back:hover { color: #0f62fe; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-box">
        <img src="amhs-logo.png" alt="AMHS Inc logo">
      </div>
      <div>
        <div class="logo-name">AMHS Inc</div>
        <div class="logo-sub">Admin Portal</div>
      </div>
    </div>

    <h1>Sign In</h1>
    <p class="subtitle">Enter your admin password to manage school documents.</p>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Admin password" autocomplete="current-password">

    <button id="login-btn" onclick="handleLogin()">Sign In</button>
    <div id="error-msg" class="error-msg"></div>

    <a href="amhsinc_modern_index.html" class="back">← Back to website</a>
  </div>

  <script>
    if (sessionStorage.getItem('amhs_admin_pw')) {
      window.location.replace('admin-upload.html');
    }

    async function handleLogin() {
      const pw = document.getElementById('password').value.trim();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');

      if (!pw) {
        errEl.textContent = 'Please enter your password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/admin/verify', {
          method: 'POST',
          headers: { 'x-admin-password': pw }
        });
        if (res.ok) {
          sessionStorage.setItem('amhs_admin_pw', pw);
          window.location.href = 'admin-upload.html';
        } else {
          errEl.textContent = 'Incorrect password. Please try again.';
          errEl.style.display = 'block';
          document.getElementById('password').select();
        }
      } catch {
        errEl.textContent = 'Cannot connect to server. Make sure the server is running.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
